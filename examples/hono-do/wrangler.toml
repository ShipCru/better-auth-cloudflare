name = "better-auth-cloudflare-hono-do"
main = "src/index.ts"
compatibility_date = "2026-05-18"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# UserDurableObject — one per principal. Owns BA user + account models.
[[durable_objects.bindings]]
name = "USER_DO"
class_name = "UserDurableObject"

# IdentityDurableObject — one per sha256(email). Global uniqueness.
[[durable_objects.bindings]]
name = "IDENTITY_DO"
class_name = "IdentityDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserDurableObject", "IdentityDurableObject"]

# Sessions + verification + rate limits live in KV (BA secondaryStorage).
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"


# Optional: Analytics Engine for testing/debugging telemetry
[[analytics_engine_datasets]]
binding = "AUTH_ANALYTICS"
dataset = "ba_cf_do_events"

# Optional: D1 auth data store. When this binding is present (and wired in
# auth/index.ts via `authDataStore: d1RecoveryStore(env.AUTH_DB)`),
# every successful DO write is one-way mirrored to D1 on a best-effort basis.
# The auth data store is NEVER queried during auth flows — auth lookups
# always go through the DOs. The store exists for DR only.
# Use `restorePrincipal({ userDo, authDataStore, principalId })`
# to replay back into the DO on storage loss.
#
# Setup (one-time):
#   wrangler d1 create ba-cf-do-recovery
#   # paste the id below
#   wrangler d1 execute ba-cf-do-recovery --remote --file ./auth-data-schema.sql
#
# Wired by default in this demo for local testing. The database_id is a
# placeholder — wrangler local mode creates an in-memory SQLite. For
# remote deploy, run `wrangler d1 create ba-cf-do-recovery` and paste the
# real id here.
[[d1_databases]]
binding = "AUTH_DB"
database_name = "ba-cf-do-recovery"
database_id = "00000000-0000-0000-0000-000000000000"

# Optional: Google OAuth. Set via secret:
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
# When set, the demo's "Continue with Google" button works end-to-end.
# Callback URL to register in Google Console:
#   https://your-worker-url/api/auth/callback/google

# Sibling deploy: same source code, opts into the IdentityDO thick_cache
# fast path. The bench page A/B's this against the default deploy.
#
#   wrangler deploy --env thick
#
# Bindings are independent — separate DO namespaces, KV, D1 — so the two
# deploys never share state. That's the right call for clean A/B numbers.
[env.thick]
name = "better-auth-cloudflare-hono-do-thick"

[env.thick.observability]
enabled = true

[env.thick.vars]
USE_THICK_IDENTITY = "1"

[[env.thick.durable_objects.bindings]]
name = "USER_DO"
class_name = "UserDurableObject"

[[env.thick.durable_objects.bindings]]
name = "IDENTITY_DO"
class_name = "IdentityDurableObject"

[[env.thick.migrations]]
tag = "v1"
new_sqlite_classes = ["UserDurableObject", "IdentityDurableObject"]

[[env.thick.kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[[env.thick.analytics_engine_datasets]]
binding = "AUTH_ANALYTICS"
dataset = "ba_cf_do_events"

# Skip D1 for the thick env to remove that variable from the bench
# comparison. Add it back if you want recovery for the thick deploy too.
