name = "better-auth-cloudflare-hono-do"
main = "src/index.ts"
compatibility_date = "2026-05-18"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# UserDurableObject — one per principal. Owns BA user + account models.
[[durable_objects.bindings]]
name = "USER_DO"
class_name = "UserDurableObject"

# IdentityDurableObject — one per sha256(email). Global uniqueness.
[[durable_objects.bindings]]
name = "IDENTITY_DO"
class_name = "IdentityDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserDurableObject", "IdentityDurableObject"]

# Sessions + verification + rate limits live in KV (BA secondaryStorage).
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"


# Optional: Analytics Engine for testing/debugging telemetry
[[analytics_engine_datasets]]
binding = "AUTH_ANALYTICS"
dataset = "ba_cf_do_events"

# Optional: D1 auth data store. When this binding is present (and wired in
# auth/index.ts via `authDataStore: d1RecoveryStore(env.AUTH_DB)`),
# every successful DO write is one-way mirrored to D1 on a best-effort basis.
# The auth data store is NEVER queried during auth flows — auth lookups
# always go through the DOs. The store exists for DR only.
# Use `restorePrincipal({ userDo, authDataStore, principalId })`
# to replay back into the DO on storage loss.
#
# Setup (one-time):
#   wrangler d1 create ba-cf-do-recovery
#   # paste the id below
#   wrangler d1 execute ba-cf-do-recovery --remote --file ./auth-data-schema.sql
#
# Wired by default in this demo for local testing. The database_id is a
# placeholder — wrangler local mode creates an in-memory SQLite. For
# remote deploy, run `wrangler d1 create ba-cf-do-recovery` and paste the
# real id here.
[[d1_databases]]
binding = "AUTH_DB"
database_name = "ba-cf-do-recovery"
database_id = "00000000-0000-0000-0000-000000000000"

# Optional: Google OAuth. Set via secret:
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
# When set, the demo's "Continue with Google" button works end-to-end.
# Callback URL to register in Google Console:
#   https://your-worker-url/api/auth/callback/google

# Sibling deploy: same source code, opts into the IdentityDO thick_cache
# fast path. The bench page A/B's this against the default deploy.
#
#   wrangler deploy --env thick
#
# Bindings are independent — separate DO namespaces, KV, D1 — so the two
# deploys never share state. That's the right call for clean A/B numbers.
[env.thick]
name = "better-auth-cloudflare-hono-do-thick"

[env.thick.observability]
enabled = true

[env.thick.vars]
USE_THICK_IDENTITY = "1"

[[env.thick.durable_objects.bindings]]
name = "USER_DO"
class_name = "UserDurableObject"

[[env.thick.durable_objects.bindings]]
name = "IDENTITY_DO"
class_name = "IdentityDurableObject"

[[env.thick.migrations]]
tag = "v1"
new_sqlite_classes = ["UserDurableObject", "IdentityDurableObject"]

[[env.thick.kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[[env.thick.analytics_engine_datasets]]
binding = "AUTH_ANALYTICS"
dataset = "ba_cf_do_events"

# Skip D1 for the thick env to remove that variable from the bench
# comparison. Add it back if you want recovery for the thick deploy too.

# Sibling deploy: same source code, opts into the faster password hash
# preset (scrypt N=4096 instead of N=16384). See src/auth/fast-hash.ts.
#
#   wrangler deploy --env fast_hash
#
# Independent DO/KV state from the default deploy. Users created here
# can ONLY sign in here (hash format incompatible with default).
[env.fast_hash]
name = "better-auth-cloudflare-hono-do-fast-hash"

[env.fast_hash.observability]
enabled = true

[env.fast_hash.vars]
USE_FAST_HASH = "1"

[[env.fast_hash.durable_objects.bindings]]
name = "USER_DO"
class_name = "UserDurableObject"

[[env.fast_hash.durable_objects.bindings]]
name = "IDENTITY_DO"
class_name = "IdentityDurableObject"

[[env.fast_hash.migrations]]
tag = "v1"
new_sqlite_classes = ["UserDurableObject", "IdentityDurableObject"]

[[env.fast_hash.kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[[env.fast_hash.analytics_engine_datasets]]
binding = "AUTH_ANALYTICS"
dataset = "ba_cf_do_events"

# Sibling deploy: native Web Crypto PBKDF2 (600k iters SHA-256) instead
# of JS scrypt. Tests whether the Workers-native crypto path beats JS
# at OWASP-recommended security level. See src/auth/pbkdf2-hash.ts.
#
#   wrangler deploy --env pbkdf2
[env.pbkdf2]
name = "better-auth-cloudflare-hono-do-pbkdf2"

[env.pbkdf2.observability]
enabled = true

[env.pbkdf2.vars]
USE_PBKDF2 = "1"

[[env.pbkdf2.durable_objects.bindings]]
name = "USER_DO"
class_name = "UserDurableObject"

[[env.pbkdf2.durable_objects.bindings]]
name = "IDENTITY_DO"
class_name = "IdentityDurableObject"

[[env.pbkdf2.migrations]]
tag = "v1"
new_sqlite_classes = ["UserDurableObject", "IdentityDurableObject"]

[[env.pbkdf2.kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[[env.pbkdf2.analytics_engine_datasets]]
binding = "AUTH_ANALYTICS"
dataset = "ba_cf_do_events"

# Sibling deploy: KV cache (with optional D1 second tier) in front of
# IdentityDO for email→principal_id lookups. Version-stamped for
# freshness audit. See src/adapters/identity-cache.ts.
#
#   wrangler deploy --env kv_cache
[env.kv_cache]
name = "better-auth-cloudflare-hono-do-kv-cache"

[env.kv_cache.observability]
enabled = true

[env.kv_cache.vars]
USE_KV_CACHE = "1"

[[env.kv_cache.durable_objects.bindings]]
name = "USER_DO"
class_name = "UserDurableObject"

[[env.kv_cache.durable_objects.bindings]]
name = "IDENTITY_DO"
class_name = "IdentityDurableObject"

[[env.kv_cache.migrations]]
tag = "v1"
new_sqlite_classes = ["UserDurableObject", "IdentityDurableObject"]

[[env.kv_cache.kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[[env.kv_cache.analytics_engine_datasets]]
binding = "AUTH_ANALYTICS"
dataset = "ba_cf_do_events"

# D1 second tier for the identity index. When bound, the cache writes
# through to D1 too and reads fall to D1 on KV miss before going to
# IdentityDO. Sessions API kicks in automatically for replica reads.
# Apply IDENTITY_INDEX_D1_SCHEMA before first use.
[[env.kv_cache.d1_databases]]
binding = "AUTH_DB"
database_name = "ba-cf-do-recovery"
database_id = "00000000-0000-0000-0000-000000000000"

# Sibling deploy: stacked combo of fast-hash + kv-cache. Tests whether
# the two optimisations compound. Expected: ~370ms warm signin p50
# (-44% vs current). `wrangler deploy --env stacked`.
[env.stacked]
name = "better-auth-cloudflare-hono-do-stacked"

[env.stacked.observability]
enabled = true

[env.stacked.vars]
USE_FAST_HASH = "1"
USE_KV_CACHE = "1"

[[env.stacked.durable_objects.bindings]]
name = "USER_DO"
class_name = "UserDurableObject"

[[env.stacked.durable_objects.bindings]]
name = "IDENTITY_DO"
class_name = "IdentityDurableObject"

[[env.stacked.migrations]]
tag = "v1"
new_sqlite_classes = ["UserDurableObject", "IdentityDurableObject"]

[[env.stacked.kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[[env.stacked.analytics_engine_datasets]]
binding = "AUTH_ANALYTICS"
dataset = "ba_cf_do_events"

[[env.stacked.d1_databases]]
binding = "AUTH_DB"
database_name = "ba-cf-do-recovery"
database_id = "00000000-0000-0000-0000-000000000000"

# RECOMMENDED PRODUCTION COMBO. Native PBKDF2 (Workers C++, no JS CPU
# pressure) + pepper (HMAC server secret before hash, defense vs DB
# leaks) + KV identity cache (skip IdentityDO on warm signin) + bundle
# RPC (one DO call instead of two for the user+accounts join).
#
#   wrangler secret put BETTER_AUTH_SECRET --env recommended
#   wrangler secret put BETTER_AUTH_PEPPER --env recommended    # hex or base64
#   wrangler deploy --env recommended
#
# Bench-validated combo deployed for live A/B as the `recommended` variant.
[env.recommended]
name = "better-auth-cloudflare-hono-do-recommended"

[env.recommended.observability]
enabled = true

[env.recommended.vars]
USE_PBKDF2 = "1"
USE_KV_CACHE = "1"
USE_BUNDLE_RPC = "1"

[[env.recommended.durable_objects.bindings]]
name = "USER_DO"
class_name = "UserDurableObject"

[[env.recommended.durable_objects.bindings]]
name = "IDENTITY_DO"
class_name = "IdentityDurableObject"

[[env.recommended.migrations]]
tag = "v1"
new_sqlite_classes = ["UserDurableObject", "IdentityDurableObject"]

[[env.recommended.kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[[env.recommended.analytics_engine_datasets]]
binding = "AUTH_ANALYTICS"
dataset = "ba_cf_do_events"

[[env.recommended.d1_databases]]
binding = "AUTH_DB"
database_name = "ba-cf-do-recovery"
database_id = "00000000-0000-0000-0000-000000000000"
