name = "better-auth-cloudflare-opennextjs-do"
main = ".open-next/worker.js"
compatibility_date = "2026-05-18"
compatibility_flags = ["nodejs_compat"]

assets = { directory = ".open-next/assets", binding = "ASSETS" }

[[durable_objects.bindings]]
name = "USER_DO"
class_name = "UserDurableObject"

[[durable_objects.bindings]]
name = "IDENTITY_DO"
class_name = "IdentityDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserDurableObject", "IdentityDurableObject"]

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[[analytics_engine_datasets]]
binding = "AUTH_ANALYTICS"
dataset = "ba_cf_do_events"

# Auth data store — DO outbox syncs writes here; admin dashboard queries
# read from here. Wrangler local mode accepts the placeholder id and
# creates an in-memory SQLite.
[[d1_databases]]
binding = "AUTH_DB"
database_name = "ba-cf-do-recovery"
database_id = "00000000-0000-0000-0000-000000000000"
